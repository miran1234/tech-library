<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة ميران التقنية | Miran Tech Hub</title>
    <style>
        :root {
            --neon-color: #00f2ff;
            --purple-glow: #bc13fe;
            --bg-color: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* تنسيق اللوجو الجديد مع التوهج المزدوج */
        .logo-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--neon-color);
            box-shadow: 0 0 20px var(--neon-color), 0 0 40px var(--purple-glow);
            margin-bottom: 20px;
            object-fit: contain; /* للحفاظ على أبعاد اللوجو */
            background-color: #000; /* خلفية سوداء للشعار */
            padding: 10px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            color: #ccc;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .status-tag {
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid var(--neon-color);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--neon-color);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        #news-section {
            width: 100%;
            margin-top: 40px;
            text-align: right;
        }

        .news-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid var(--neon-color);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .news-card:hover {
            transform: scale(1.02);
            background: #202020;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .logo-img { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="assets/logo.png" alt="Miran Tech Logo" class="logo-img">
        
        <h1>MIRAN TECH HUB</h1>
        <div class="status-tag">System Online - Powered by Termux</div>
        
        <p>مرحباً بكم في منصتي التقنية. هنا أقوم بتوثيق تجاربي البرمجية وإدارة مشاريعي مباشرة من هاتفي عبر بيئة Termux.</p>

        <div id="news-section">
            <h2 style="color: var(--neon-color);">آخر التحديثات التقنية</h2>
            <div id="news-container">
                <div class="news-card">
                    <h3>جاري إعداد البوت...</h3>
                    <p>سيقوم البوت قريباً بجلب آخر أخبار البرمجيات والذكاء الاصطناعي وتحديثها هنا تلقائياً.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
