<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miran Tech Hub | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --bg: #0a0a0a;
            --card: #161616;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px var(--neon); }
            50% { box-shadow: 0 0 30px var(--neon), 0 0 10px var(--purple); }
            100% { box-shadow: 0 0 15px var(--neon); }
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* واجهة تسجيل الدخول */
        .auth-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--neon);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-box {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--neon);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--neon); }

        /* قسم الداشبورد (مخفي) */
        #dashboard { display: none; }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            text-align: right;
        }

        .status-on { color: var(--neon); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="auth-page" class="container">
        <div class="auth-card">
            <div class="logo-box">M</div>
            <h2 style="color: var(--neon)">نظام ميران الآمن</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="signIn()">دخول النظام</button>
            <button onclick="signUp()" style="background: transparent; color: #666; font-size: 0.8rem;">إنشاء حساب جديد</button>
        </div>
    </div>

    <div id="dashboard" class="container">
        <div class="logo-box">M</div>
        <h2 id="welcome-msg">مرحباً ريم</h2>
        
        <div class="settings-item">
            <span>قاعدة البيانات</span>
            <span class="status-on">متصل بـ Supabase ●</span>
        </div>

        <div class="settings-item">
            <span>تحديثات التيرمكس</span>
            <span class="status-on">نشط ●</span>
        </div>

        <button onclick="signOut()" style="background: transparent; border: 1px solid #ff4444; color: #ff4444; margin-top: 30px;">خروج آمن</button>
    </div>

    <script>
        // مفاتيح الربط الخاصة بكِ
        const SUPABASE_URL = 'https://yreqhlhzytjtvjfhqym.supabase.co'; 
        const SUPABASE_KEY = 'Sb_publishable_Ktrt_xWJD90rUQg4q0EC3g_MbXTmbhm';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // وظيفة تسجيل الدخول
        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("خطأ في الدخول: " + error.message);
            else showDashboard();
        }

        // وظيفة إنشاء حساب
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert("خطأ: " + error.message);
            else alert("تم إنشاء الحساب! تحققي من بريدك للتفعيل (أو سجلي الدخول مباشرة إذا ألغيتِ التفعيل)");
        }

        function showDashboard() {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
