<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة ميران التقنية | Miran Tech Hub</title>
    <style>
        :root {
            --neon-color: #00f2ff;
            --purple-glow: #bc13fe;
            --bg-color: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* تصميم اللوجو البرمجي المتوهج */
        .logo-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--neon-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px var(--neon-color), 0 0 20px var(--purple-glow);
            box-shadow: 0 0 15px var(--neon-color), inset 0 0 10px var(--neon-color);
            margin-bottom: 20px;
            background: rgba(0, 242, 255, 0.05);
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-color);
            letter-spacing: 2px;
        }

        .status-tag {
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid var(--neon-color);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--neon-color);
            margin-bottom: 30px;
        }

        #news-section {
            width: 100%;
            margin-top: 40px;
            text-align: right;
        }

        .news-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid var(--neon-color);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .logo-box { width: 80px; height: 80px; font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">M</div>
        
        <h1>MIRAN TECH HUB</h1>
        <div class="status-tag">System Online - Powered by Termux</div>
        
        <p>مرحباً بكم في منصتي التقنية. إدارة المشاريع والأتمتة مباشرة من هاتفي.</p>

        <div id="news-section">
            <h2 style="color: var(--neon-color);">آخر التحديثات التقنية</h2>
            <div id="news-container">
                <div class="news-card">
                    <h3>جاري تشغيل البوت...</h3>
                    <p>استخدمي أمر `python bot.py` في Termux لتحديث هذا القسم.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
