<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tech Library | ميران</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: #0f1219;
            --accent: #00f2ff;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }
        /* خلفية النجوم المتحركة */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        header {
            height: 60vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, rgba(0,242,255,0.05), transparent);
        }
        header h1 {
            font-size: 3.5rem; color: var(--accent);
            text-shadow: 0 0 20px rgba(0,242,255,0.6);
            margin: 0;
            animation: fadeInDown 1.5s;
        }
        .container { max-width: 1000px; margin: -50px auto 50px; padding: 20px; }
        
        /* تصميم كرت الخبر الاحترافي */
        .news-card {
            background: var(--card);
            border: 1px solid #1e2533;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .news-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0,242,255,0.2);
            transform: translateY(-10px);
        }
        .news-card h2 { color: var(--accent); margin-top: 0; }
        .news-card p { line-height: 1.8; color: #adb5bd; }
        
        .btn-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(90deg, var(--accent), #00a2ff);
            color: #000; font-weight: bold;
            border-radius: 50px; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,242,255,0.3);
            transition: 0.3s;
        }
        .btn-link:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(0,242,255,0.5); }
    </style>
</head>
<body>
    <div class="stars"></div>
    <header>
        <h1 class="animate__animated animate__pulse animate__infinite">PRO TECH LIBRARY</h1>
        <p>بوابة ميران لعالم التكنولوجيا</p>
    </header>

    <div class="container" id="news-container">
        <div class="news-card animate__animated animate__fadeInUp">
            <h2>مرحباً بكِ في واجهتكِ الجديدة</h2>
            <p>هذا الموقع جاهز لاستقبال الأخبار من تيرمكس مباشرة. التصميم يدعم الأنميشن والسرعة القصوى.</p>
            <a href="#" class="btn-link">استكشف النظام</a>
        </div>
    </div>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script>
        ScrollReveal().reveal('.news-card', { delay: 300, distance: '50px', origin: 'bottom' });
    </script>
</body>
</html>
